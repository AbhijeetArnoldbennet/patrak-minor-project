<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PATRAK</title>

<style>

body{
font-family:'Segoe UI',Arial;
margin:0;
background:#A7EBF2;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* Main card */

.container{
text-align:center;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0px 8px 20px rgba(0,0,0,0.15);
}

/* Logo */

.logo{
width:335px;
height:295px;
overflow:hidden;
margin:auto;
}

.logo img{
width:340px;
margin-bottom:30px;
filter:drop-shadow(0px 5px 10px rgba(0,0,0,0.2));
}

/* Tagline */

.tagline{
font-size:25px;
color:#26658C;
margin-top:20px;
margin-bottom:40px;
}

/* Buttons */

.buttons{
display:flex;
flex-direction:column;
gap:20px;
width:270px;
margin:auto;
}

button{
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
background:#54ACBF;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#26658C;
transform:scale(1.05);
}

/* Footer */

footer{
margin-top:40px;
font-size:20px;
opacity:0.7;
color:#023859;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="images/patrak-logo.png">
</div>

<div class="tagline">
Smart Patient Token & Queue System
</div>

<div class="buttons">

<button onclick="openRegister()">
Patient Registration
</button>

<button onclick="openHistory()">
Patient History
</button>

<button onclick="openToken()">
Live Token Screen
</button>

</div>

</div>

<footer>
© 2026 PATRAK | Smart Clinic System
</footer>

<script>

function openRegister(){
window.location.href="register.html";
}

function openHistory(){
window.location.href="history.html";
}

function openToken(){
window.location.href="token.html";
}

</script>

</body>
</html>
